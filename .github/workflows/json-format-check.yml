name: JSON Format Check

on:
  pull_request:
    branches:
      - main
    paths:
      - "**/*.json"
      - "package.json"
      - "package-lock.json"
      - ".prettierrc.json"
      - ".github/workflows/json-format-check.yml"

jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Check changed JSON files
        shell: bash
        run: |
          mapfile -t files < <(git diff --name-only --diff-filter=ACMRT origin/${{ github.base_ref }}...HEAD -- '*.json')
          if [ ${#files[@]} -eq 0 ]; then
            echo "No changed JSON files."
            exit 0
          fi
          npx prettier --check "${files[@]}"
