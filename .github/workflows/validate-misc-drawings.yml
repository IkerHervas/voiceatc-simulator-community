name: Validate Misc Drawings

on:
  pull_request:
    branches:
      - main
    paths:
      - "**/misc_drawings.json"
      - "tools/misc_drawings_manifest.py"
      - "tests/test_misc_drawings_manifest.py"
      - ".github/workflows/validate-misc-drawings.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py"
      - name: Validate misc drawings files
        run: python tools/misc_drawings_manifest.py --validate-only
